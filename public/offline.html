<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0b2530" />
    <title>Nova Forma CRM offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #081116;
        color: #eef6f8;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(92vw, 30rem);
        border: 1px solid #263844;
        border-radius: 1rem;
        background: #101b22;
        padding: 1.5rem;
        box-shadow: 0 24px 70px rgb(0 0 0 / 0.42);
      }
      strong {
        color: #d59a55;
      }
      p {
        color: #a8b9c1;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>Nova Forma CRM</strong>
      <h1>Voce esta offline</h1>
      <p>Abra uma tela ja sincronizada ou volte quando houver conexao para carregar novas paginas, fazer login ou usar IA.</p>
    </main>
  </body>
</html>
