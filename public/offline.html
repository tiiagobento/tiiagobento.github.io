<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0b2530" />
    <title>Nova Forma CRM offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgb(213 154 85 / 0.18), transparent 32rem),
          linear-gradient(180deg, #0b2530 0%, #081116 62%);
        color: #eef6f8;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 1rem;
      }
      main {
        width: min(92vw, 30rem);
        border: 1px solid #263844;
        border-radius: 1.35rem;
        background: linear-gradient(180deg, rgb(16 27 34 / 0.96), rgb(10 21 27 / 0.96));
        padding: 1.25rem;
        box-shadow: 0 24px 70px rgb(0 0 0 / 0.42);
      }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 800;
      }
      .mark {
        display: grid;
        place-items: center;
        width: 3rem;
        height: 3rem;
        border-radius: 1rem;
        background: #d59a55;
        color: #17120c;
      }
      strong {
        color: #d59a55;
      }
      h1 {
        margin: 1.5rem 0 0.5rem;
        font-size: clamp(1.75rem, 8vw, 2.35rem);
        line-height: 1.05;
      }
      p {
        color: #a8b9c1;
        line-height: 1.6;
      }
      button {
        width: 100%;
        min-height: 3rem;
        margin-top: 1rem;
        border: 0;
        border-radius: 0.9rem;
        background: #d59a55;
        color: #17120c;
        font-weight: 800;
        font-size: 1rem;
      }
      .hint {
        margin-top: 1rem;
        border-radius: 1rem;
        background: rgb(255 255 255 / 0.06);
        padding: 0.9rem;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo"><span class="mark">NF</span><span>Nova Forma CRM</span></div>
      <h1>Voce esta offline</h1>
      <p>As telas e dados ja sincronizados continuam disponiveis no app. Para carregar novas paginas, fazer login ou usar IA, reconecte a internet.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
      <p class="hint">Alteracoes feitas offline no CRM sao salvas localmente e sincronizadas quando a conexao voltar.</p>
    </main>
  </body>
</html>
